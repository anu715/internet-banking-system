<!DOCTYPE html>

<html class="light" lang="en"><head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-secondary-fixed-variant": "#005047",
                        "inverse-primary": "#99d0d9",
                        "tertiary-fixed-dim": "#c4c7c9",
                        "on-background": "#111c2d",
                        "on-secondary-fixed": "#00201c",
                        "on-error-container": "#93000a",
                        "surface-container-low": "#f0f3ff",
                        "outline-variant": "#bfc8ca",
                        "primary-container": "#0d4c54",
                        "surface-dim": "#cfdaf2",
                        "primary": "#00343a",
                        "surface-container-high": "#dee8ff",
                        "on-surface": "#111c2d",
                        "on-primary": "#ffffff",
                        "error-container": "#ffdad6",
                        "surface-tint": "#2f666e",
                        "on-secondary-container": "#007165",
                        "on-surface-variant": "#40484a",
                        "error": "#ba1a1a",
                        "tertiary-container": "#424547",
                        "surface-variant": "#d8e3fb",
                        "on-error": "#ffffff",
                        "tertiary-fixed": "#e0e3e5",
                        "surface-bright": "#f9f9ff",
                        "secondary-container": "#62fae3",
                        "inverse-surface": "#263143",
                        "surface-container-highest": "#d8e3fb",
                        "on-tertiary": "#ffffff",
                        "surface-container": "#e7eeff",
                        "surface-container-lowest": "#ffffff",
                        "inverse-on-surface": "#ecf1ff",
                        "background": "#f9f9ff",
                        "on-primary-fixed": "#001f24",
                        "secondary": "#006b5f",
                        "secondary-fixed-dim": "#3cddc7",
                        "on-secondary": "#ffffff",
                        "primary-fixed": "#b5ecf5",
                        "secondary-fixed": "#62fae3",
                        "on-tertiary-container": "#b0b2b4",
                        "tertiary": "#2b2f31",
                        "primary-fixed-dim": "#99d0d9",
                        "surface": "#f9f9ff",
                        "on-tertiary-fixed": "#191c1e",
                        "on-primary-fixed-variant": "#104e56",
                        "outline": "#70797a",
                        "on-tertiary-fixed-variant": "#444749",
                        "on-primary-container": "#85bbc4"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "stack-md": "16px",
                        "stack-lg": "32px",
                        "gutter": "16px",
                        "margin-mobile": "20px",
                        "stack-sm": "8px",
                        "container-padding": "24px"
                    },
                    "fontFamily": {
                        "h2": ["Manrope"],
                        "label-caps": ["Inter"],
                        "body-lg": ["Inter"],
                        "h3": ["Manrope"],
                        "body-sm": ["Inter"],
                        "h1": ["Manrope"],
                        "body-md": ["Inter"],
                        "numeric-display": ["Manrope"]
                    },
                    "fontSize": {
                        "h2": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                        "label-caps": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                        "body-lg": ["18px", {"lineHeight": "28px", "letterSpacing": "0", "fontWeight": "400"}],
                        "h3": ["20px", {"lineHeight": "28px", "letterSpacing": "0", "fontWeight": "600"}],
                        "body-sm": ["14px", {"lineHeight": "20px", "letterSpacing": "0", "fontWeight": "400"}],
                        "h1": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "body-md": ["16px", {"lineHeight": "24px", "letterSpacing": "0", "fontWeight": "400"}],
                        "numeric-display": ["36px", {"lineHeight": "44px", "letterSpacing": "-0.03em", "fontWeight": "700"}]
                    }
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="bg-background text-on-background font-body-md antialiased min-h-screen pb-32">
<!-- TopAppBar -->
<header class="flex justify-between items-center px-5 h-16 w-full fixed top-0 z-50 bg-slate-50 dark:bg-slate-950 border-b border-slate-200 dark:border-slate-800 font-manrope antialiased tracking-tight">
    <div class="flex items-center gap-4">
        <span class="material-symbols-outlined text-teal-900 dark:text-teal-400">menu</span>
        <h1 class="text-lg font-bold text-teal-900 dark:text-teal-50">TrustBank</h1>
    </div>
    <div class="w-8 h-8 rounded-full overflow-hidden bg-surface-container">
        <img alt="Profile Photo" class="w-full h-full object-cover" data-alt="portrait of a professional man with a friendly expression in a clean studio setting with soft lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDpH1rrX9YjiIgciW2hKl4tonfNB7iAanlprdTzpvQ883GSOVnlJ4_J6Nlx0MncvmYf4XYJSaPWm3dNXRu8SFyvR4K3lXmHtsku-dKa1Sqp_3p_odqrmUFzUQ4JjHp94A45UBHunz6W2hSoTXAEtS5BhiBVREKXtIV_9gIs-d-AYypBd0fPUK78s-qHQ1NGl4J6jAxaTQscfKkbXPG7oTxnGYqf60_Stxwn1aXhHDbkJtfUayLhjqRMa11O_EIex2BLwgZ4VIpKaMU"/>
    </div>
</header>
<!-- Main Content Canvas -->
<main class="pt-20 px-margin-mobile flex flex-col gap-stack-lg max-w-xl mx-auto">
    <!-- Section: Send Money (Recipient Selection) -->
    <section class="flex flex-col gap-stack-md">
        <h2 class="font-h2 text-h2 text-primary">Send Money</h2>
        <div class="flex flex-col gap-4">
            <p class="font-label-caps text-label-caps text-on-surface-variant uppercase">Recent Recipients</p>
            <div class="flex gap-4 overflow-x-auto hide-scrollbar py-2">
                <!-- Recipient Circle -->
                <div class="flex flex-col items-center gap-2 flex-shrink-0">
                    <div class="w-16 h-16 rounded-full p-0.5 border-2 border-secondary-fixed">
                        <img class="w-full h-full rounded-full object-cover" data-alt="headshot of a smiling woman with glasses and professional attire" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCQXZJp82JUFf7176HJ2UBFLglZgBeOr4_jm0BHzanW25D5U5Xe8jq2KMvSFckAVO1LFl57zecGbo4XejeqNRWujRqVXK0k4KMvgdDlRVJy144XUC3hDVxClAjV5MnIId2veU4SwNOWbM6wj4ke9wq4Rjgv--FT_1XJQfI0REq4mfNmu36i1tCAn6EPwlhDmeZe3E8vr1UAgde3eC0FWvd_ddAzhS7kRoVd_cb2kALJWz__EIY1wXj5F88f-V-SoKHueivIKU19Yis"/>
                    </div>
                    <span class="font-body-sm text-body-sm">Sarah</span>
                </div>
                <div class="flex flex-col items-center gap-2 flex-shrink-0">
                    <div class="w-16 h-16 rounded-full p-0.5 border-2 border-transparent">
                        <img class="w-full h-full rounded-full object-cover" data-alt="portrait of a young man with a casual style against a neutral background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDIZXSvjFZGN2YT9_nqdDilCiqWbaMQeRD2pWtax1Ww1xH4jNDirodGRpyrh6Mvl0WVjCJeJxsisWJ9JVtFNyWkUAhbL3vcA58QDoKiQl9DMaN3pwGfpDiEKDkxhh36U2rVQPHycxs60fm8Bssp04lkFgSt6RE1ScQId00vZyME8WuhZ8SzaHNf67kyrz_XNVt3fGYAVPh7pv_FhUQ2TKKYbiaQPktuZnx55sviyttI58Rf4XvoIUKtsSkKj7z6YumnNGqocxN8fek"/>
                    </div>
                    <span class="font-body-sm text-body-sm">James</span>
                </div>
                <div class="flex flex-col items-center gap-2 flex-shrink-0">
                    <div class="w-16 h-16 rounded-full p-0.5 border-2 border-transparent">
                        <img class="w-full h-full rounded-full object-cover" data-alt="middle-aged man with a graying beard smiling warmly" src="https://lh3.googleusercontent.com/aida-public/AB6AXuB5dHutnWw0_FK49jlNwiyDuzv1qoJvKfxojF8g3TbuR8zTB-Py6DZcdTZonHWPGmWtZeDBVnnVsO_SLeVBW7OUXXoMNfKDroQ5owB1oL3aC3XSQk7LowXIhE7SwOQOo_OB5B9_WOOFlkZBkP7Yw7TJMYAPrxRW_kFt1DvWNf_dvTjZytuzhimVcZU1apxYtEPNmR7D5R9o4zjhcCcDKyTuvDTDKxHKPyYJ8rIaWDtOS7J7umhfHYuWa0oDmk0JyJO-FyT2T9UoxAs"/>
                    </div>
                    <span class="font-body-sm text-body-sm">Robert</span>
                </div>
                <div class="flex flex-col items-center gap-2 flex-shrink-0">
                    <button class="w-16 h-16 rounded-full bg-surface-container flex items-center justify-center text-primary">
                        <span class="material-symbols-outlined">add</span>
                    </button>
                    <span class="font-body-sm text-body-sm">New</span>
                </div>
            </div>
        </div>
        <!-- Amount Input Card -->
        <div class="bg-white rounded-xl p-container-padding shadow-[0_4px_20px_rgba(0,0,0,0.04)] border border-slate-50">
            <div class="flex flex-col gap-stack-sm">
                <label class="font-label-caps text-label-caps text-on-surface-variant">Enter Amount</label>
                <div class="flex items-center gap-2">
                    <span class="font-numeric-display text-h1 text-primary">$</span>
                    <input class="w-full bg-transparent border-none focus:ring-0 font-numeric-display text-numeric-display text-primary placeholder:text-surface-dim p-0" placeholder="0.00" type="number"/>
                </div>
            </div>
            <div class="mt-6">
                <button class="w-full bg-primary text-on-primary py-4 rounded-xl font-h3 text-body-md transition-all active:scale-95">
                    Continue to Pay
                </button>
            </div>
        </div>
    </section>
    <!-- Section: UPI / VPA Payment -->
    <section class="flex flex-col gap-stack-md">
        <h3 class="font-h3 text-h3 text-primary">Pay to UPI ID</h3>
        <div class="relative group">
            <div class="absolute inset-y-0 left-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-secondary">
                <span class="material-symbols-outlined">alternate_email</span>
            </div>
            <input class="w-full pl-12 pr-4 py-4 bg-white border border-slate-200 rounded-xl focus:border-secondary focus:ring-1 focus:ring-secondary outline-none transition-colors font-body-md" placeholder="example@trustbank" type="text"/>
        </div>
    </section>
    <!-- Section: Quick Bill Payments (Bento Style) -->
    <section class="flex flex-col gap-stack-md">
        <div class="flex justify-between items-end">
            <h3 class="font-h3 text-h3 text-primary">Quick Bills</h3>
            <span class="font-label-caps text-secondary text-label-caps">View All</span>
        </div>
        <div class="grid grid-cols-2 gap-4">
            <!-- Electricity -->
            <button class="flex flex-col items-start gap-4 p-5 bg-white border border-slate-50 rounded-2xl shadow-[0_4px_20px_rgba(0,0,0,0.04)] text-left transition-all active:scale-95 group">
                <div class="w-12 h-12 rounded-xl bg-teal-50 flex items-center justify-center text-secondary group-hover:bg-secondary group-hover:text-white transition-colors">
                    <span class="material-symbols-outlined">bolt</span>
                </div>
                <div>
                    <p class="font-body-md font-semibold text-on-surface">Electricity</p>
                    <p class="font-body-sm text-on-surface-variant">Due: $42.00</p>
                </div>
            </button>
            <!-- Mobile Recharge -->
            <button class="flex flex-col items-start gap-4 p-5 bg-white border border-slate-50 rounded-2xl shadow-[0_4px_20px_rgba(0,0,0,0.04)] text-left transition-all active:scale-95 group">
                <div class="w-12 h-12 rounded-xl bg-teal-50 flex items-center justify-center text-secondary group-hover:bg-secondary group-hover:text-white transition-colors">
                    <span class="material-symbols-outlined">smartphone</span>
                </div>
                <div>
                    <p class="font-body-md font-semibold text-on-surface">Mobile</p>
                    <p class="font-body-sm text-on-surface-variant">Prepaid/Postpaid</p>
                </div>
            </button>
            <!-- DTH -->
            <button class="col-span-2 flex items-center gap-6 p-5 bg-white border border-slate-50 rounded-2xl shadow-[0_4px_20px_rgba(0,0,0,0.04)] text-left transition-all active:scale-95 group">
                <div class="w-12 h-12 rounded-xl bg-teal-50 flex items-center justify-center text-secondary group-hover:bg-secondary group-hover:text-white transition-colors">
                    <span class="material-symbols-outlined">tv</span>
                </div>
                <div class="flex-grow">
                    <p class="font-body-md font-semibold text-on-surface">DTH Services</p>
                    <p class="font-body-sm text-on-surface-variant">Instant Top-up</p>
                </div>
                <span class="material-symbols-outlined text-slate-300">chevron_right</span>
            </button>
        </div>
    </section>
    <!-- Section: Secure Payment Banner -->
    <section class="bg-primary-container rounded-2xl p-6 relative overflow-hidden">
        <div class="relative z-10 flex flex-col gap-2">
            <h4 class="text-on-primary-container font-h3 text-body-lg font-bold">100% Secure Payments</h4>
            <p class="text-on-primary-container opacity-80 text-body-sm">Your transactions are encrypted with bank-grade security protocols.</p>
        </div>
        <div class="absolute -bottom-6 -right-6 w-32 h-32 bg-secondary opacity-10 rounded-full blur-2xl"></div>
    </section>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full h-20 flex justify-around items-center px-4 pb-safe z-50 bg-white dark:bg-slate-900 border-t border-slate-100 dark:border-slate-800 shadow-[0_-4px_20px_rgba(0,0,0,0.04)]">
    <!-- Home -->
    <div class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 px-3 py-1 hover:text-teal-700 dark:hover:text-teal-300 transition-transform active:scale-95 duration-200">
        <span class="material-symbols-outlined">home</span>
        <span class="text-[11px] font-medium font-manrope">Home</span>
    </div>
    <!-- Payments (Active State) -->
    <div class="flex flex-col items-center justify-center text-teal-900 dark:text-teal-400 bg-teal-50/50 dark:bg-teal-900/20 rounded-xl px-3 py-1 transition-transform active:scale-95 duration-200">
        <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">payments</span>
        <span class="text-[11px] font-medium font-manrope">Payments</span>
    </div>
    <!-- Cards -->
    <div class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 px-3 py-1 hover:text-teal-700 dark:hover:text-teal-300 transition-transform active:scale-95 duration-200">
        <span class="material-symbols-outlined">credit_card</span>
        <span class="text-[11px] font-medium font-manrope">Cards</span>
    </div>
    <!-- Profile -->
    <div class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 px-3 py-1 hover:text-teal-700 dark:hover:text-teal-300 transition-transform active:scale-95 duration-200">
        <span class="material-symbols-outlined">person</span>
        <span class="text-[11px] font-medium font-manrope">Profile</span>
    </div>
</nav>
</body></html>

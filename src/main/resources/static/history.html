<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>TrustBank History</title>

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>

    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#00343a",
                        secondary: "#006b5f",
                        surface: "#f9f9ff",
                        "on-surface": "#111c2d"
                    },
                    spacing: {
                        "margin-mobile": "20px",
                        "container-padding": "24px"
                    },
                    fontFamily: {
                        body: ["Inter"],
                        display: ["Manrope"]
                    }
                }
            }
        }
    </script>

    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        body {
            min-height: 100vh;
        }
    </style>

</head>

<body class="bg-surface font-body text-on-surface">

<header class="bg-white flex justify-between items-center px-5 py-3 border-b fixed top-0 w-full z-50">
    <span class="font-bold text-teal-900">TrustBank</span>
</header>

<main class="pt-20 pb-36 px-margin-mobile max-w-md mx-auto">

    <h1 class="text-3xl font-bold text-primary mb-2">History</h1>
    <p class="text-sm text-gray-500 mb-6">View your transactions</p>

    <div class="space-y-4">

        <div class="p-4 bg-white rounded-xl shadow-lg flex justify-between">
            <div>
                <p class="font-semibold">Apple Store</p>
                <p class="text-sm text-gray-500">Aug 24 • Purchase</p>
            </div>
            <p class="text-red-500 font-bold">-1299.00</p>
        </div>

        <div class="p-4 bg-white rounded-xl shadow-lg flex justify-between">
            <div>
                <p class="font-semibold">Salary</p>
                <p class="text-sm text-gray-500">Aug 22 • Income</p>
            </div>
            <p class="text-green-600 font-bold">+6120.00</p>
        </div>

        <div class="p-4 bg-white rounded-xl shadow-lg flex justify-between">
            <div>
                <p class="font-semibold">Electricity Bill</p>
                <p class="text-sm text-gray-500">Aug 20 • Bill</p>
            </div>
            <p class="text-red-500 font-bold">-120.50</p>
        </div>

    </div>

</main>

<!-- Bottom Navigation -->
<nav class="fixed bottom-0 left-0 w-full bg-white border-t flex justify-around py-3 pb-36">

    <a href="dashboard.html" class="text-gray-400 flex flex-col items-center">
        <span class="material-symbols-outlined">home</span>
        <span class="text-xs">Home</span>
    </a>

    <a href="payments.html" class="text-gray-400 flex flex-col items-center">
        <span class="material-symbols-outlined">payments</span>
        <span class="text-xs">Payments</span>
    </a>

    <a href="cards.html" class="text-gray-400 flex flex-col items-center">
        <span class="material-symbols-outlined">credit_card</span>
        <span class="text-xs">Cards</span>
    </a>

    <!-- FIXED HISTORY LINK -->
    <a href="history.html" class="text-teal-900 flex flex-col items-center">
        <span class="material-symbols-outlined">history</span>
        <span class="text-xs">History</span>
    </a>

    <a href="more.html" class="text-gray-400 flex flex-col items-center">
        <span class="material-symbols-outlined">menu</span>
        <span class="text-xs">More</span>
    </a>

</nav>

</body>
</html>

<!DOCTYPE html>

<html class="light" lang="en"><head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&amp;family=Inter:wght@400;500;600&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .bg-tertiary-slate-wash { background-color: #f9f9ff; }
        .ambient-shadow { shadow: 0 4px 20px rgba(0,0,0,0.04); }
    </style>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-secondary-fixed-variant": "#005047",
                        "inverse-primary": "#99d0d9",
                        "tertiary-fixed-dim": "#c4c7c9",
                        "on-background": "#111c2d",
                        "on-secondary-fixed": "#00201c",
                        "on-error-container": "#93000a",
                        "surface-container-low": "#f0f3ff",
                        "outline-variant": "#bfc8ca",
                        "primary-container": "#0d4c54",
                        "surface-dim": "#cfdaf2",
                        "primary": "#00343a",
                        "surface-bright": "#f9f9ff",
                        "on-surface": "#111c2d",
                        "on-primary": "#ffffff",
                        "error-container": "#ffdad6",
                        "surface-tint": "#2f666e",
                        "on-secondary-container": "#007165",
                        "on-surface-variant": "#40484a",
                        "error": "#ba1a1a",
                        "tertiary-container": "#424547",
                        "surface-variant": "#d8e3fb",
                        "on-error": "#ffffff",
                        "tertiary-fixed": "#e0e3e5",
                        "surface-bright": "#f9f9ff",
                        "secondary-container": "#62fae3",
                        "inverse-surface": "#263143",
                        "surface-container-highest": "#d8e3fb",
                        "on-tertiary": "#ffffff",
                        "surface-container": "#e7eeff",
                        "surface-container-lowest": "#ffffff",
                        "inverse-on-surface": "#ecf1ff",
                        "background": "#f9f9ff",
                        "on-primary-fixed": "#001f24",
                        "secondary": "#006b5f",
                        "secondary-fixed-dim": "#3cddc7",
                        "on-secondary": "#ffffff",
                        "primary-fixed": "#b5ecf5",
                        "secondary-fixed": "#62fae3",
                        "on-tertiary-container": "#b0b2b4",
                        "tertiary": "#2b2f31",
                        "primary-fixed-dim": "#99d0d9",
                        "surface": "#f9f9ff",
                        "on-tertiary-fixed": "#191c1e",
                        "on-primary-fixed-variant": "#104e56",
                        "outline": "#70797a",
                        "on-tertiary-fixed-variant": "#444749",
                        "on-primary-container": "#85bbc4"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "stack-md": "16px",
                        "stack-lg": "32px",
                        "gutter": "16px",
                        "margin-mobile": "20px",
                        "stack-sm": "8px",
                        "container-padding": "24px"
                    },
                    "fontFamily": {
                        "h2": ["Manrope"],
                        "label-caps": ["Inter"],
                        "body-lg": ["Inter"],
                        "h3": ["Manrope"],
                        "body-sm": ["Inter"],
                        "h1": ["Manrope"],
                        "body-md": ["Inter"],
                        "numeric-display": ["Manrope"]
                    },
                    "fontSize": {
                        "h2": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                        "label-caps": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                        "body-lg": ["18px", {"lineHeight": "28px", "letterSpacing": "0", "fontWeight": "400"}],
                        "h3": ["20px", {"lineHeight": "28px", "letterSpacing": "0", "fontWeight": "600"}],
                        "body-sm": ["14px", {"lineHeight": "20px", "letterSpacing": "0", "fontWeight": "400"}],
                        "h1": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "body-md": ["16px", {"lineHeight": "24px", "letterSpacing": "0", "fontWeight": "400"}],
                        "numeric-display": ["36px", {"lineHeight": "44px", "letterSpacing": "-0.03em", "fontWeight": "700"}]
                    }
                },
            },
        }
    </script>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="bg-background font-body-md text-on-surface antialiased">
<!-- Top AppBar -->
<header class="flex justify-between items-center px-5 h-16 w-full fixed top-0 z-50 bg-slate-50 dark:bg-slate-950 border-b border-slate-200 dark:border-slate-800 font-manrope antialiased tracking-tight">
    <div class="flex items-center gap-4">
        <span class="material-symbols-outlined text-teal-900 dark:text-teal-400">menu</span>
        <span class="text-lg font-bold text-teal-900 dark:text-teal-50">TrustBank</span>
    </div>
    <div class="w-8 h-8 rounded-full overflow-hidden border-2 border-primary-container">
        <img alt="Alex Sterling" class="w-full h-full object-cover" data-alt="professional portrait of a young man with a friendly expression in a modern office setting, soft natural lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDTF-mLV_kMCoB_80s2LN2Wr_rvlxZvfH3dt03qLFfFUyOSsUo7vbhBmAf6a63FPD4gn-RUAioAIjQsDr4HdmvTPXDwL4ybUWz4MdUHoF5dAk-9EUK8h1iGequKkvvrlJFlaaKyDSc4BZzFV8HHXSzCbBkNfsxtPpK-cWvjXFuDYGzJ7K53D4_-pheDKpH7eYeEzbJIF8eGqqRMzI1VT51wdd3cdSUsFdTMazk9z60glyG-dXq7DhjULpcVqjzMKqjzSD3NJnEhVzA"/>
    </div>
</header>
<main class="pt-20 pb-28 px-margin-mobile max-w-md mx-auto">
    <!-- User Profile Hero -->
    <section class="flex flex-col items-center mb-stack-lg">
        <div class="relative mb-stack-md">
            <div class="w-24 h-24 rounded-full overflow-hidden border-4 border-white shadow-lg">
                <img alt="Alex Sterling" class="w-full h-full object-cover" data-alt="close up headshot of a person with professional attire against a blurred neutral background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuD2_SUjABPVziFfUrsOn3ePcTKZ6EufZn4M38tXDUN78TaKQ2kdlx9Khkuo1vayv32cohToJU-1DOL08s_AT5fDQgnbzm-r1UlEeVJHdeTLEBEERG5eUr4fQVw5FYuu_PnXaaFWZpbS7ZvMPeO_qbo48xAOmspalOl5348s9eh-pGuu6H0TOfsYbMUfZDpVdysUSpBbWE8odqZXXlgwDTiNMfMtTXCfhRawZrZ3xeDUsbCHwW_Hj6YEzoXez4UWs3X_OHHphoQyNcc"/>
            </div>
            <div class="absolute bottom-0 right-0 bg-secondary px-2 py-0.5 rounded-full border-2 border-white flex items-center gap-1 shadow-sm">
                <span class="material-symbols-outlined text-[12px] text-white" style="font-variation-settings: 'FILL' 1;">verified</span>
                <span class="text-[10px] font-bold text-white uppercase tracking-wider">Verified</span>
            </div>
        </div>
        <h1 class="font-h2 text-h2 text-primary">Alex Sterling</h1>
        <p class="font-body-sm text-body-sm text-outline">Member since Oct 2021</p>
    </section>
    <!-- Account Details Bento Card -->
    <section class="bg-white rounded-xl shadow-[0_4px_20px_rgba(0,0,0,0.04)] p-container-padding mb-stack-md space-y-stack-md">
        <div class="flex items-center gap-stack-md">
            <div class="w-10 h-10 rounded-full bg-teal-50/50 flex items-center justify-center">
                <span class="material-symbols-outlined text-secondary">mail</span>
            </div>
            <div class="flex flex-col">
                <span class="font-label-caps text-label-caps text-outline uppercase">Email Address</span>
                <span class="font-body-md text-body-md text-on-surface">alex@sterling.com</span>
            </div>
        </div>
        <div class="flex items-center gap-stack-md">
            <div class="w-10 h-10 rounded-full bg-teal-50/50 flex items-center justify-center">
                <span class="material-symbols-outlined text-secondary">phone</span>
            </div>
            <div class="flex flex-col">
                <span class="font-label-caps text-label-caps text-outline uppercase">Phone Number</span>
                <span class="font-body-md text-body-md text-on-surface">+1 555 0123</span>
            </div>
        </div>
        <div class="flex items-center gap-stack-md">
            <div class="w-10 h-10 rounded-full bg-teal-50/50 flex items-center justify-center">
                <span class="material-symbols-outlined text-secondary">home_pin</span>
            </div>
            <div class="flex flex-col">
                <span class="font-label-caps text-label-caps text-outline uppercase">Primary Residence</span>
                <span class="font-body-md text-body-md text-on-surface">San Francisco, CA</span>
            </div>
        </div>
    </section>
    <!-- Identity & Security Grid -->
    <div class="grid grid-cols-2 gap-stack-md mb-stack-lg">
        <div class="bg-white p-container-padding rounded-xl shadow-[0_4px_20px_rgba(0,0,0,0.04)] flex flex-col gap-2">
            <span class="material-symbols-outlined text-secondary">security</span>
            <span class="font-h3 text-[16px] text-primary">Security</span>
            <span class="font-body-sm text-body-sm text-outline">Face ID active</span>
        </div>
        <div class="bg-white p-container-padding rounded-xl shadow-[0_4px_20px_rgba(0,0,0,0.04)] flex flex-col gap-2">
            <span class="material-symbols-outlined text-secondary">shield_person</span>
            <span class="font-h3 text-[16px] text-primary">Privacy</span>
            <span class="font-body-sm text-body-sm text-outline">Level 3 Data</span>
        </div>
    </div>
    <!-- Preferences List -->
    <section class="bg-white rounded-xl shadow-[0_4px_20px_rgba(0,0,0,0.04)] overflow-hidden mb-stack-lg">
        <button class="w-full flex items-center justify-between p-container-padding hover:bg-slate-50 transition-colors">
            <div class="flex items-center gap-stack-md">
                <span class="material-symbols-outlined text-outline">notifications</span>
                <span class="font-body-md text-body-md">Notifications</span>
            </div>
            <span class="material-symbols-outlined text-outline">chevron_right</span>
        </button>
        <div class="mx-container-padding border-t border-slate-100"></div>
        <button class="w-full flex items-center justify-between p-container-padding hover:bg-slate-50 transition-colors">
            <div class="flex items-center gap-stack-md">
                <span class="material-symbols-outlined text-outline">language</span>
                <span class="font-body-md text-body-md">Language</span>
            </div>
            <div class="flex items-center gap-1">
                <span class="font-body-sm text-outline">English</span>
                <span class="material-symbols-outlined text-outline">chevron_right</span>
            </div>
        </button>
        <div class="mx-container-padding border-t border-slate-100"></div>
        <button class="w-full flex items-center justify-between p-container-padding hover:bg-slate-50 transition-colors">
            <div class="flex items-center gap-stack-md">
                <span class="material-symbols-outlined text-outline">description</span>
                <span class="font-body-md text-body-md">Statements &amp; Docs</span>
            </div>
            <span class="material-symbols-outlined text-outline">chevron_right</span>
        </button>
    </section>
    <!-- Logout Action -->
    <button class="w-full py-4 rounded-xl border-1.5 border-error text-error font-h3 text-[16px] flex items-center justify-center gap-2 mb-stack-lg active:scale-95 transition-transform duration-150">
        <span class="material-symbols-outlined">logout</span>
        Logout
    </button>
</main>
<!-- Bottom Navigation Bar -->
<nav class="fixed bottom-0 left-0 w-full h-20 bg-white dark:bg-slate-900 border-t border-slate-100 dark:border-slate-800 shadow-[0_-4px_20px_rgba(0,0,0,0.04)] flex justify-around items-center px-4 pb-safe z-50">
    <button class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 px-3 py-1 hover:text-teal-700 dark:hover:text-teal-300 active:scale-95 transition-transform duration-200">
        <span class="material-symbols-outlined" data-icon="home">home</span>
        <span class="text-[11px] font-medium font-manrope">Home</span>
    </button>
    <button class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 px-3 py-1 hover:text-teal-700 dark:hover:text-teal-300 active:scale-95 transition-transform duration-200">
        <span class="material-symbols-outlined" data-icon="payments">payments</span>
        <span class="text-[11px] font-medium font-manrope">Payments</span>
    </button>
    <button class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 px-3 py-1 hover:text-teal-700 dark:hover:text-teal-300 active:scale-95 transition-transform duration-200">
        <span class="material-symbols-outlined" data-icon="credit_card">credit_card</span>
        <span class="text-[11px] font-medium font-manrope">Cards</span>
    </button>
    <button class="flex flex-col items-center justify-center text-teal-900 dark:text-teal-400 bg-teal-50/50 dark:bg-teal-900/20 rounded-xl px-3 py-1 active:scale-95 transition-transform duration-200">
        <span class="material-symbols-outlined" data-icon="person" style="font-variation-settings: 'FILL' 1;">person</span>
        <span class="text-[11px] font-medium font-manrope">Profile</span>
    </button>
</nav>
</body></html>
